use_default_settings: true

server:
  secret_key: "${SEARXNG_SECRET_KEY}"
  bind_address: "0.0.0.0:8080"
  public_instance: false

search:
  formats:
    - html
    - json

engines:
  - name: duckduckgo
    engine: duckduckgo
    categories: general
    disabled: false

  - name: bing
    engine: bing
    categories: general
    disabled: false

  - name: brave
    engine: brave
    categories: general
    disabled: false

  - name: yahoo
    engine: yahoo
    categories: general
    disabled: false

  - name: wikipedia
    engine: wikipedia
    categories: general
    disabled: false